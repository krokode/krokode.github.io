<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Weather Bubble Carousel</title>
  
  <!-- Premium Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <!-- Parent Stylesheets -->
  <link rel="stylesheet" href="../package/3d-bubble-carousel/src/bubble-carousel.css?v=2">
  <link rel="stylesheet" href="../index.css?v=2">

  <!-- Custom Stylesheet for Weather Carousel -->
  <link rel="stylesheet" href="./weather-custom.css">
</head>
<body>

  <!-- Reset/Refresh Button -->
  <button id="reset-defaults-btn" class="theme-switcher" style="right: auto; left: 20px;">
    <span class="material-symbols-outlined" style="font-size: 1.1rem">sync</span>
    <span>Refresh Weather</span>
  </button>

  <!-- Theme Toggle -->
  <button id="theme-toggle-btn" class="theme-switcher">
    <span class="material-symbols-outlined" style="font-size: 1.1rem">light_mode</span>
    <span id="theme-btn-text">Light Mode</span>
  </button>

  <!-- Carousel Mount Point -->
  <div id="carousel-mount" class="dashboard-card"></div>

  <div class="status-panel">
    Tip: Click the focused bubble to cycle between temperature units (°C/°F). Hover for detailed metrics.
  </div>

  <!-- Weather Config Helper -->
  <script src="./weatherConfigHelper.js"></script>
  
  <!-- Parent Carousel Logic -->
  <script type="module" src="../package/3d-bubble-carousel/src/bubble-carousel.js?v=3"></script>
  
  <!-- Weather Carousel Initialization -->
  <script src="./weather-index.js"></script>
</body>
</html>
