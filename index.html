<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Planetary Bubble Carousel - Sandbox Preview</title>
  <link rel="icon" type="image/png" href="./favicon_3d.png">

  <!-- Premium Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@500;700;900&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">

  <!-- Carousel Stylesheet -->
  <link rel="stylesheet" href="./bubble-carousel.css?v=2">

  <!-- Index Styles for Demo Page -->
  <link rel="stylesheet" href="./index.css?v=2">

  <!-- Stats Editor Stylesheet -->
  <link rel="stylesheet" href="./stats-editor.css?v=2">

  <!-- Add Bubble Stylesheet -->
  <link rel="stylesheet" href="./add-bubble.css?v=2">

</head>

<body>

  <!-- Reset Defaults -->
  <button id="reset-defaults-btn" class="theme-switcher" style="right: auto; left: 20px;">
    <span class="material-symbols-outlined" style="font-size: 1.1rem">restart_alt</span>
    <span>Reset Defaults</span>
  </button>

  <!-- Theme Toggle -->
  <button id="theme-toggle-btn" class="theme-switcher">
    <span class="material-symbols-outlined" style="font-size: 1.1rem">light_mode</span>
    <span id="theme-btn-text">Light Mode</span>
  </button>

  <header class="sandbox-header">
    <div class="header-logo">
      <span class="material-symbols-outlined logo-icon">bubble_chart</span>
      <h1>3D Bubble Carousel</h1>
    </div>
    <p class="subtitle">Modular Vanilla HTML/CSS/JS Component Sandbox</p>
    <nav class="header-nav">
      <a href="./crypto-buble-example/index.html" class="nav-pill crypto-pill">
        <span class="material-symbols-outlined">monetization_on</span>
        <span>Crypto Example</span>
      </a>
      <a href="./weather-bubble-example-frompackage/index.html" class="nav-pill weather-pill">
        <span class="material-symbols-outlined">partly_cloudy_day</span>
        <span>Weather Example</span>
      </a>
    </nav>
  </header>

  <!-- Carousel Dashboard Card Container -->
  <div id="carousel-mount" class="dashboard-card"></div>

  <div class="status-panel">
    Tip: Click the focused bubble to cycle active measurement modes.
  </div>

  <!-- Configuration Script -->
  <script src="./bubbleConfig.js?v=2"></script>
  <!-- Stats Editor Script -->
  <script src="./stats-editor.js?v=2"></script>
  <!-- Add Bubble Script -->
  <script src="./add-bubble.js?v=2"></script>
  <!-- Carousel Script -->
  <script src="./bubble-carousel.js?v=2"></script>
  <!-- Index Script -->
  <script src="./index.js?v=2"></script>
</body>

</html>
